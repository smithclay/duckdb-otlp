#
# Publishes the otlp extension as UNSIGNED loadable binaries to GitHub Pages,
# laid out as a DuckDB custom extension repository:
#
#   https://<owner>.github.io/duckdb-otlp/<duckdb_version>/<arch>/otlp.duckdb_extension.gz
#
# Users then install with:
#   SET allow_unsigned_extensions = true;            -- or start the CLI with -unsigned
#   INSTALL otlp FROM 'https://<owner>.github.io/duckdb-otlp';
#   LOAD otlp;
#
# This repository also publishes the Astro docs site to GitHub Pages. Pages
# artifact deploys replace the whole site, so this workflow builds a complete
# Pages artifact containing both the site and the extension repository.
#
name: Release to GitHub Pages

on:
  release:
    types: [published]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  actions: read
  contents: write
  pages: write
  id-token: write

env:
  EXT_NAME: otlp
  DUCKDB_VERSION: v1.5.3

jobs:
  # Reuse the same build half the CI pipeline uses; produces one
  # `<EXT_NAME>-<DUCKDB_VERSION>-extension-<arch>` artifact per platform.
  build:
    name: Build extension binaries
    uses: duckdb/extension-ci-tools/.github/workflows/_extension_distribution.yml@v1.5.3
    with:
      duckdb_version: v1.5.3
      ci_tools_version: v1.5.3
      extension_name: otlp
      extra_toolchains: rust
      exclude_archs: "wasm_mvp;wasm_threads;linux_amd64_musl"

  package:
    name: Package unsigned binaries and deploy site
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: ${{ env.EXT_NAME }}-${{ env.DUCKDB_VERSION }}-extension-*

      - name: Assemble repository tree
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          prefix="${EXT_NAME}-${DUCKDB_VERSION}-extension-"
          found=0
          mkdir -p _extension_repository
          for dir in artifacts/${prefix}*/; do
            arch="$(basename "$dir")"
            arch="${arch#${prefix}}"
            src="${dir}${EXT_NAME}.duckdb_extension"
            if [ ! -f "$src" ]; then
              echo "::warning::no ${EXT_NAME}.duckdb_extension in ${dir}, skipping ${arch}"
              continue
            fi
            out="_extension_repository/${DUCKDB_VERSION}/${arch}"
            mkdir -p "$out"
            # Match the official unsigned packaging: replace any existing
            # signature placeholder with the unsigned 256-byte zero signature,
            # then gzip for DuckDB's native extension repository path.
            cp "$src" work.bin
            truncate -s -256 work.bin
            dd if=/dev/zero bs=256 count=1 status=none >> work.bin
            gzip -n < work.bin > "${out}/${EXT_NAME}.duckdb_extension.gz"
            rm -f work.bin
            echo "packaged ${arch}"
            found=$((found + 1))
          done
          if [ "$found" -eq 0 ]; then
            echo "::error::no extension binaries found to package"
            exit 1
          fi
          echo "Packaged ${found} platform(s) for ${DUCKDB_VERSION}"

      - name: Write extension repository index
        shell: bash
        env:
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: |
          set -euo pipefail
          mkdir -p _extension_repository/extensions
          {
            echo "<!doctype html><meta charset=utf-8>"
            echo "<title>duckdb-otlp extension repository</title>"
            echo "<h1>duckdb-otlp extension repository</h1>"
            echo "<p>Unsigned DuckDB extension repository. Requires DuckDB <code>${DUCKDB_VERSION}</code>.</p>"
            echo "<pre>SET allow_unsigned_extensions = true;"
            echo "INSTALL ${EXT_NAME} FROM '${PAGES_BASE_URL}';"
            echo "LOAD ${EXT_NAME};</pre>"
            echo "<h2>Available binaries</h2><ul>"
            for f in $(cd _extension_repository && find "${DUCKDB_VERSION}" -name '*.duckdb_extension.gz' | sort); do
              echo "<li><a href=\"../${f}\">${f}</a></li>"
            done
            echo "</ul>"
          } > _extension_repository/extensions/index.html
          touch _extension_repository/.nojekyll

      - name: Archive extension repository
        run: tar -czf extension-repository.tar.gz -C _extension_repository .

      - name: Upload extension repository release asset
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ github.event.release.tag_name }}" extension-repository.tar.gz --clobber

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install site dependencies
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          ASTRO_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Add extension repository to site
        run: tar -xzf extension-repository.tar.gz -C site/dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
