# extra settings to be merged into OpenTelemetry Collector configuration
# do not delete this file
#
# USAGE:
# Copy this file to src/otel-collector/otelcol-config-extras.yml in the
# opentelemetry-demo repository to send traces, logs, and metrics to a local
# duckdb-otlp server running in local-ducklake mode.
#
# Start duckdb-otlp first:
#   docker run --rm --name duckdb-otlp \
#     --env-file .env \
#     -p 4318:4318 \
#     -v "$(pwd)/data:/data" \
#     ghcr.io/smithclay/duckdb-otlp:latest
#
# See: https://github.com/open-telemetry/opentelemetry-demo

exporters:
  otlp_http/duckdb:
    endpoint: http://host.docker.internal:4318
    headers:
      Authorization: Bearer dev-token-123456

service:
  pipelines:
    traces:
      # Keep existing exporters and add duckdb-otlp.
      exporters: [otlp, debug, spanmetrics, otlp_http/duckdb]
    logs:
      # Keep existing exporters and add duckdb-otlp.
      exporters: [opensearch, debug, otlp_http/duckdb]
    metrics:
      # Keep existing exporters and add duckdb-otlp.
      exporters: [otlp_http/prometheus, debug, otlp_http/duckdb]
